# A6 — hetero Charbonnier + side loss + larger crop, Retinex w=16.
network:
  name: RetinexDarkIR-S
  img_channels: 3
  width: 16
  middle_blk_num_enc: 2
  middle_blk_num_dec: 2
  enc_blk_nums: [1, 2, 3]
  dec_blk_nums: [3, 1, 1]
  dilations: [1, 4, 9]
  extra_depth_wise: true
  use_retinex: true
  illum_base: 16

train:
  resume: result_checkpoints/retinex_DarkIR_M.pth
  resume_weights_only: true
  epochs: 100
  batch_size: 4
  crop_size: 320
  lr_initial: 0.0002
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  eta_min: 0.000001
  num_workers: 0
  val_every: 1
  val_max_batches: 0
  val_lpips: false
  save_by: psnr

loss:
  w_l1: 1.0
  w_lol: 1.0
  w_edge: 0.0
  w_lpips: 0.0
  hetero: true

dataset:
  train_dir: ../dataset/train
  val_dir: ../dataset/val

save:
  checkpoint_dir: result_checkpoints/ablation/A6
